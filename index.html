<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tidalist - Visual Task Management</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; color: white; }
    .container { text-align: center; padding: 48px 24px; max-width: 600px; }
    .icon { width: 120px; height: 120px; border-radius: 28px; margin-bottom: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
    h1 { font-size: 2.5rem; margin-bottom: 12px; }
    .tagline { font-size: 1.2rem; opacity: 0.9; margin-bottom: 32px; }
    .description { font-size: 1rem; opacity: 0.8; margin-bottom: 40px; line-height: 1.6; }
    .links { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .links a { color: white; text-decoration: none; padding: 8px 20px; border: 1.5px solid rgba(255,255,255,0.5); border-radius: 24px; font-size: 0.9rem; transition: all 0.2s; }
    .links a:hover { background: rgba(255,255,255,0.15); border-color: white; }
    .footer { position: fixed; bottom: 24px; left: 0; right: 0; text-align: center; font-size: 0.8rem; opacity: 0.6; }
  </style>
</head>
<body>
  <div class="container">
    <img class="icon" src="icon.png" alt="Tidalist" onerror="this.style.display='none'">
    <h1>Tidalist</h1>
    <p class="tagline">Visual task management for focus and clarity</p>
    <p class="description">
      Designed for ADHD minds and anyone who thinks visually.<br>
      All data stays on your device. No account needed. No tracking.
    </p>
    <div class="links">
      <a href="./privacy">Privacy Policy</a>
      <a href="./terms">Terms of Service</a>
      <a href="mailto:support@tidalist.app">Contact</a>
    </div>
  </div>
  <div class="footer">&copy; 2026 Tidalist. All rights reserved.</div>
</body>
</html>
